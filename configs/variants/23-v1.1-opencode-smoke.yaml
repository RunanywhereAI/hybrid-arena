# v1.1.0 smoke — proof-of-life that the harness end-to-end works on
# this machine. 1 task per category × 4 strategies × 1 seed = 4 rows.
# Bundled with the v1.1.0 release tarball as `results-v1.1.0-smoke.tar.gz`.
#
# Invocation:
#   ./bench sweep --config configs/variants/23-v1.1-opencode-smoke.yaml \
#     --strategies always-cloud,always-local,heuristic,cascade --seeds 42

# yaml-language-server: $schema=../schema.json

variant_tag: v1.1-opencode-smoke
out_dir: results/runs/23-v1.1-opencode-smoke

models:
  cloud: gpt-5.5
  local: qwen3-coder:30b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  categories: [X]                            # smoke uses Exercism Python — opencode agent needs fixture_dir
  routes: [R8]
  seeds: [42]
  smoke: true                                # 1 task per category

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
