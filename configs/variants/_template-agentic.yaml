# Template for a v1.2+ agentic-routing sweep (R7 aider — primary).
#
# Copy this, change models.local to whatever new model you want to
# benchmark, then run:
#
#   ./bench setup                    # one-time
#   ./bench sweep --config configs/variants/my-variant.yaml \
#     --strategies always-cloud,always-local,heuristic,cascade \
#     --seeds 42,7,13
#   ./bench analyze results/runs/my-variant/
#
# Per-cell subdirectories under out_dir hold one raw.jsonl each:
#   results/runs/my-variant/<strategy>/seed-<N>/raw.jsonl
#
# Bootstrap CIs land in results/runs/my-variant/bootstrap_cis.json.
#
# v1.2 NOTE: aider (R7) is the canonical agent. R6/R8 are in-tree but
# EXPERIMENTAL — opencode (R8) + qwen3-coder:30b hybrid doesn't produce
# useful work due to opencode's free-form tool-use pattern; see v1.1.x
# release notes for the empirical diagnosis. Stick with R7 unless you
# have a 70B+ local model to test against.
#
# See docs/BENCHMARK_NEW_MODEL.md for the full production-pipeline
# walkthrough. See docs/AGENTIC_ROUTES.md for R6/R7/R8 design.

# yaml-language-server: $schema=../schema.json

# REQUIRED --------------------------------------------------------------
variant_tag: my-agentic-variant
out_dir: results/runs/XX-my-agentic-variant

models:
  cloud: gpt-5.5                             # Cloud baseline. Keep gpt-5.5 to match the v1.1.K canonical.
  local: qwen3-coder:30b                     # The model under test. v1.1.K canonical uses qwen3-coder:30b.

# OPTIONAL (defaults shown) ---------------------------------------------
#   cloud_fallback: gpt-5
#   judge: claude-opus-4-7                   # Used for prose-judged shapes (C-arch, D3, D4)
#   router_classifier: qwen3:0.6b            # llm-classifier strategy
#   local_base_url: http://127.0.0.1:11434/v1
#   cloud_base_url: https://api.openai.com/v1

router:
  strategy: heuristic                        # v1.1+: heuristic is agent-aware. Other valid choices:
                                             # always-local | always-cloud | rules | llm-classifier | embedding-knn | cascade
  port: 8787
  banner: true

# v1.2 default mix — aider on Exercism Python. To expand to additional
# task shapes (e.g. real-dev D1/D5), wire fixture_dir into the R7
# runner's _copy_fixture for those categories.
benchmark:
  categories: [X]                            # X=exercism_python (currently the v1.2 supported set)
  routes: [R7]                               # R7 aider (v1.2 canonical agent)
  seeds: [42]                                # Override with --seeds 42,7,13 on the sweep CLI for CIs
  smoke: false
  tasks_per_category: {X: 5}

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
