# Template for a hybrid-coding-eval run. Copy this, change the two
# required lines (variant_tag + models), run:
#
#   ./bench run --config configs/variants/my-variant.yaml
#
# Schema reference: configs/schema.json (auto-generated from
# src/hybrid_coding_eval/core/config/schema.py — never hand-edit).
# Env-var substitution: any ${ENV:VAR} is expanded at load time.

# yaml-language-server: $schema=../schema.json

# REQUIRED --------------------------------------------------------------
variant_tag: my-variant                       # goes into every ResultRow.variant
out_dir: results/runs/XX-my-variant

models:
  cloud: gpt-5.5                              # R1/R3/R4 supervisor
  local: devstral:24b                         # R2/R3 executor/R4 worker

# OPTIONAL (defaults shown) ---------------------------------------------
#   cloud_fallback: gpt-5
#   judge: claude-opus-4-7                    # Opus for cross-vendor cat-C judgment
#   router_classifier: qwen3:0.6b
#   local_base_url: http://127.0.0.1:11434/v1
#   cloud_base_url: https://api.openai.com/v1

router:
  strategy: heuristic                         # always-local|always-cloud|rules|heuristic|llm-classifier|embedding-knn|cascade
  port: 8787
  banner: true
  prompt_cache: false                         # true = turn on OpenAI prompt caching (see T-13)

benchmark:
  categories: [A, B, C]                       # A=HumanEval+, B=SWE-bench, C=BigCodeBench+custom_arch
  routes: [R1, R2, R3, R4]
  seeds: [42]
  smoke: false
  # tasks_per_category: { A: 10, B: 10, C: 10 }

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
# git_sha_pin: null    # uncomment + set to enforce SHA on replay
