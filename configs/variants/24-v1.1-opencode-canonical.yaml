# v1.1.K canonical — the publishable sweep. 25 tasks × 4 strategies × 3 seeds = 300 rows.
# Bundled with v1.1.K release tarball as `results-v1.1.K.tar.gz`.
# Wall: ~6-10 h on M4 Max. Spend: ~$10-25 OpenAI + ~$1 Anthropic judge.
#
# Invocation:
#   ./bench sweep --config configs/variants/24-v1.1-opencode-canonical.yaml \
#     --strategies always-cloud,always-local,heuristic,cascade \
#     --seeds 42,7,13
#
# Each (strategy, seed) lands in its own subdirectory:
#   results/runs/24-v1.1-opencode-canonical/<strategy>/seed-<N>/raw.jsonl
#
# Then:
#   ./bench analyze results/runs/24-v1.1-opencode-canonical/
# → aggregate.json + bootstrap_cis.json + decision_matrix.md + charts/

# yaml-language-server: $schema=../schema.json

variant_tag: v1.1-opencode-canonical
out_dir: results/runs/24-v1.1-opencode-canonical

models:
  cloud: gpt-5.5
  local: qwen3-coder:30b

router:
  strategy: heuristic                        # Overridden per-pass by `./bench sweep --strategies`
  port: 8787
  banner: true

# v1.1.K canonical mix — scoped to opencode-compatible categories.
# Category A (HumanEval+) and B (SWE-bench) need fixture infrastructure
# R8 doesn't currently provide (HumanEval+ has no fixture_dir; SWE-bench
# uses Docker repos). Scoping to X (Exercism Python) + D (real-dev with
# fixture trees) keeps R8 in scope; A/B will fold in for v1.2's broader
# canonical when R8 grows fixture support for those task types.
benchmark:
  categories: [X]                            # Exercism Python — 5 vendored fixtures
  routes: [R8]                               # Opencode only in v1.1 canonical
  seeds: [42, 7, 13]                         # Three independent seeds for bootstrap CIs
  smoke: false
  tasks_per_category: {X: 5}                 # All 5 vendored exercism tasks

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5
    - openai-gpt5
    - openai-gpt5-mini
    - anthropic-claude-opus-4.7
    - anthropic-claude-sonnet-4.6
    - anthropic-claude-haiku-4.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
