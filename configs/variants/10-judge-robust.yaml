# T-14: re-judge custom_arch outputs from 02-v2-qwen-fixed-synth under
# three judges (Opus + Sonnet + GPT-5.5) × two A/B orders. No new
# inference — this config drives the analysis script only; it is not
# a sweep config in the same sense as 05-09.

# yaml-language-server: $schema=../schema.json

variant_tag: judge-robust
out_dir: results/runs/10-judge-robust

models:
  cloud: gpt-5.5                            # one of three judges
  local: devstral:24b                       # unused — no inference this run
  judge: claude-opus-4-7                    # primary judge

router:
  strategy: heuristic

benchmark:
  categories: [C]                           # custom_arch subset of C
  routes: [R1, R3]                          # pairings we re-judge
  seeds: [42]

pricing:
  primary: openai-gpt5.5
