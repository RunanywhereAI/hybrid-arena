# Smoke test for Category-D (real_dev) — one task per shape × R1 only.
#
# Why R1 only: R1 is the cloud-direct path — no local executor, no
# router, no custom prompt caching. It is the cheapest end-to-end
# confirmation that Category-D tasks produce scored rows. Once R1 is
# green, later smokes will expand to R2/R3/R4/R5.
#
# Tasks scope: 5 rows, one per shape (D1 → D2 → D3 → D4 → D5).
# Achieved via two knobs:
#
# 1. ``benchmark.categories: [D]`` — narrows to Category-D only.
# 2. ``benchmark.tasks_per_category: {D: 5}`` ... but that config knob
#    is not yet wired through ``bench run`` at the time of P2.1. As a
#    pragmatic substitute we rely on the round-robin merge ordering in
#    ``bin/merge_real_dev_shards.py``: the first five rows of
#    ``tasks.jsonl`` are exactly D1, D2, D3, D4, D5 in that order. So
#    passing ``--tasks 5`` at invocation time picks one per shape:
#
#        ./bench run --config configs/variants/_smoke-realdev.yaml
#        ./bin/run-experiment.py --config _smoke-realdev --tasks 5
#
# Or run the shorter equivalent via the CLI flag forwarded by ``bench run``
# (for a future P2.x adding ``tasks_per_category`` threading):
#
#        bench run -c configs/variants/_smoke-realdev.yaml
#
# Cost: R1 only, 5 calls to the cloud model + 4 judge calls for D3/D4.
# Should stay under USD 1 at gpt-5.5 prices.

# yaml-language-server: $schema=../schema.json

variant_tag: _smoke-realdev
out_dir: results/runs/_smoke-realdev

models:
  cloud: gpt-5.5
  cloud_fallback: gpt-5
  local: devstral:24b
  judge: claude-opus-4-7

router:
  strategy: heuristic
  # R1 doesn't use the router so this is decorative, but the runner
  # boots the proxy banner regardless so we keep it correct.

benchmark:
  categories: [D]                 # real_dev only.
  routes: [R1]                    # cloud direct — cheapest.
  seeds: [42]
  smoke: false
  # Cap to five tasks — the merge helper orders tasks.jsonl so the first
  # five are one-per-shape (D1, D2, D3, D4, D5). See the header comment.
  tasks_per_category: { D: 5 }

pricing:
  primary: openai-gpt5.5

scoring:
  skip: false
