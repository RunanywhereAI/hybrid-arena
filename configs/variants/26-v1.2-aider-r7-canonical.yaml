# v1.2 R7 Aider canonical — same matrix as the v1.1.3 opencode canonical,
# different agent. 5 Exercism Python tasks × 4 strategies × 3 seeds.
#
# R7 uses Aider's architect/editor mode via LiteLLM, calling the proxy
# under model name "openai/router/<strategy>". Different prompt shape +
# tool protocol than opencode (R8) — useful comparison data point.

# yaml-language-server: $schema=../schema.json

variant_tag: v1.2-aider-r7-canonical
out_dir: results/runs/26-v1.2-aider-r7-canonical

models:
  cloud: gpt-5.5
  local: qwen3-coder:30b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  categories: [X]
  routes: [R7]
  seeds: [42, 7, 13]
  smoke: false
  tasks_per_category: {X: 5}

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
