# v1.1 iteration mini-sweep — used by the autonomous tuning loop
# (Phase 7 of the v1.1 plan). 5 tasks × 4 strategies × 1 seed = 20 rows
# per iteration. Each iteration's results bundle into a patch release
# tarball (v1.1.1, v1.1.2, ...).
#
# Invocation:
#   ./bench sweep --config configs/variants/25-v1.1-opencode-iter.yaml \
#     --strategies always-cloud,always-local,heuristic,cascade --seeds 42
#
# This is the FAST cycle: smaller-than-canonical, sparse CIs (n_seeds=1
# so the bootstrap mostly captures task-to-task variance), short feedback
# loop for tuning ROUTER_AGENT_HEURISTIC_THRESHOLD + system markers +
# phase weights. After tuning converges, the full sweep at
# configs/variants/24-v1.1-opencode-canonical.yaml produces the
# release-quality dataset.

# yaml-language-server: $schema=../schema.json

variant_tag: v1.1-opencode-iter
out_dir: results/runs/25-v1.1-opencode-iter

models:
  cloud: gpt-5.5
  local: qwen3-coder:30b

router:
  strategy: heuristic
  port: 8787
  banner: true

benchmark:
  categories: [A, B, D, X]
  routes: [R8]
  seeds: [42]
  smoke: false
  tasks_per_category: {A: 1, B: 2, D: 1, X: 1}   # 5 tasks total

pricing:
  primary: openai-gpt5.5
  scenarios:
    - openai-gpt5.5

scoring:
  skip: false
  judge_temperature: 0.0
  swebench_image: hybrid-eval-python:latest

resume: false
